<svg width="1200" height="800" viewBox="0 0 1200 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Fonts -->
  <style>
    .title-text { font-family: 'Inter', system-ui, sans-serif; font-weight: 800; fill: #FFFFFF; font-size: 22px; }
    .header-text { font-family: 'Inter', system-ui, sans-serif; font-weight: 700; fill: #FFFFFF; font-size: 26px; }
    .sub-text { font-family: 'Inter', system-ui, sans-serif; font-weight: 400; fill: #94A3B8; font-size: 14px; }
    .sidebar-section { font-family: 'Inter', system-ui, sans-serif; font-weight: 600; fill: #64748B; font-size: 11px; letter-spacing: 1px; }
    .sidebar-item { font-family: 'Inter', system-ui, sans-serif; font-weight: 500; fill: #94A3B8; font-size: 14px; cursor: pointer; }
    .sidebar-item.active { fill: #10B981; font-weight: 600; }
    .card-title { font-family: 'Inter', system-ui, sans-serif; font-weight: 700; fill: #FFFFFF; font-size: 16px; }
    .card-data { font-family: 'Inter', system-ui, sans-serif; font-weight: 800; fill: #10B981; font-size: 20px; }
    .card-status { font-family: 'Inter', system-ui, sans-serif; font-weight: 500; fill: #64748B; font-size: 12px; }
  </style>

  <!-- Background Grid -->
  <rect width="1200" height="800" fill="#0B0F19"/>
  <path d="M0 100H1200M0 200H1200M0 300H1200M0 400H1200M0 500H1200M0 600H1200M0 700H1200" stroke="#1E293B" stroke-opacity="0.3"/>
  <path d="M150 0V800M300 0V800M450 0V800M600 0V800M750 0V800M900 0V800M1050 0V800" stroke="#1E293B" stroke-opacity="0.3"/>

  <!-- Left Sidebar Panel -->
  <rect width="250" height="800" fill="#0F172A" />
  <line x1="250" y1="0" x2="250" y2="800" stroke="#1E293B" />

  <!-- Logo and Rebranding -->
  <circle cx="50" cy="50" r="16" fill="#8C52FF" />
  <circle cx="50" cy="50" r="8" fill="#1E293B" />
  <circle cx="50" cy="50" r="3" fill="#FFFFFF" />
  <text x="78" y="57" class="title-text">Nature AI</text>
  <text x="78" y="73" class="sub-text" font-size="11px">Species Directory</text>

  <!-- Sidebar Sections -->
  <text x="30" y="140" class="sidebar-section">NATURE MODULES</text>

  <!-- Active Telemetry Dashboard -->
  <rect x="20" y="160" width="210" height="40" rx="8" fill="#1E293B" />
  <circle cx="40" cy="180" r="4" fill="#10B981" />
  <text x="56" y="185" class="sidebar-item active">Telemetry Console</text>

  <!-- Other Menu Items -->
  <circle cx="40" cy="235" r="4" fill="#94A3B8" />
  <text x="56" y="240" class="sidebar-item">Birds &amp; Aviaries</text>
  
  <circle cx="40" cy="285" r="4" fill="#94A3B8" />
  <text x="56" y="290" class="sidebar-item">Fish &amp; Aquatic</text>

  <circle cx="40" cy="335" r="4" fill="#94A3B8" />
  <text x="56" y="340" class="sidebar-item">Environment</text>

  <circle cx="40" cy="385" r="4" fill="#94A3B8" />
  <text x="56" y="390" class="sidebar-item">Camera Traps</text>

  <text x="30" y="460" class="sidebar-section">GLOBAL SYSTEMS</text>
  <text x="56" y="495" class="sidebar-item">Climate Metrics</text>
  <text x="56" y="545" class="sidebar-item">Analytics Reports</text>
  <text x="56" y="595" class="sidebar-item">API Connections</text>

  <!-- Main Content Header -->
  <text x="290" y="60" class="header-text">Nature AI Dashboard</text>
  <text x="290" y="85" class="sub-text">Real-time status, directories, and telemetry of species sensors</text>

  <!-- Top bar status indicator -->
  <rect x="940" y="35" width="220" height="40" rx="20" fill="#0F172A" stroke="#1E293B"/>
  <circle cx="965" cy="55" r="6" fill="#10B981"/>
  <text x="982" y="60" font-family="Inter" font-weight="600" fill="#10B981" font-size="12px">All Sensors Operational</text>

  <!-- ==================== 8 TELEMETRY CARDS ==================== -->

  <!-- CARD 1: Birds Directory -->
  <g transform="translate(290, 130)">
    <rect width="270" height="180" rx="12" fill="#1E293B" stroke="#334155" />
    <circle cx="230" cy="35" r="5" fill="#F59E0B" />
    <text x="25" y="35" class="card-title">Birds Directory</text>
    <text x="25" y="70" class="card-data" fill="#F59E0B">2,482 Species</text>
    <text x="25" y="90" class="card-status">Active acoustic tracking</text>
    <!-- Waveform graphic representing acoustic matching -->
    <path d="M25 140 Q40 100 55 140 T85 140 T115 140 T145 140 T175 140 T205 140 T235 140" stroke="#F59E0B" stroke-width="2" fill="none" opacity="0.8"/>
  </g>

  <!-- CARD 2: Aviary Light Controls -->
  <g transform="translate(585, 130)">
    <rect width="270" height="180" rx="12" fill="#1E293B" stroke="#334155" />
    <circle cx="230" cy="35" r="5" fill="#10B981" />
    <text x="25" y="35" class="card-title">Aviary Light Control</text>
    <text x="25" y="70" class="card-data" fill="#10B981">550 Lux</text>
    <text x="25" y="90" class="card-status">Optimal light spectrum active</text>
    <!-- Step chart representing lux levels -->
    <path d="M25 150 H55 V120 H85 V135 H115 V110 H145 V130 H175 V125 H205 V150" stroke="#10B981" stroke-width="2" fill="none" opacity="0.8"/>
  </g>

  <!-- CARD 3: Environment Diagnostics -->
  <g transform="translate(880, 130)">
    <rect width="270" height="180" rx="12" fill="#1E293B" stroke="#334155" />
    <circle cx="230" cy="35" r="5" fill="#3B82F6" />
    <text x="25" y="35" class="card-title">Environment Index</text>
    <text x="25" y="70" class="card-data" fill="#3B82F6">AQI: 24 (Excellent)</text>
    <text x="25" y="90" class="card-status">Soil Moisture: 64%</text>
    <!-- Environmental bar graphs -->
    <rect x="25" y="125" width="200" height="8" rx="4" fill="#1E293B" stroke="#334155"/>
    <rect x="25" y="125" width="160" height="8" rx="4" fill="#3B82F6"/>
    <rect x="25" y="145" width="200" height="8" rx="4" fill="#1E293B" stroke="#334155"/>
    <rect x="25" y="145" width="120" height="8" rx="4" fill="#10B981"/>
  </g>

  <!-- CARD 4: Fish & Aquatic Sensor -->
  <g transform="translate(290, 335)">
    <rect width="270" height="180" rx="12" fill="#1E293B" stroke="#334155" />
    <circle cx="230" cy="35" r="5" fill="#06B6D4" />
    <text x="25" y="35" class="card-title">Fish &amp; Aquatic</text>
    <text x="25" y="70" class="card-data" fill="#06B6D4">pH: 7.2 | 24°C</text>
    <text x="25" y="90" class="card-status">Salinity level: 32 ppt (Normal)</text>
    <!-- Waveform graphic representing water waves -->
    <path d="M25 130 C45 110 55 150 75 130 C95 110 105 150 125 130 C145 110 155 150 175 130 C195 110 205 150 225 130" stroke="#06B6D4" stroke-width="2" fill="none" opacity="0.8"/>
  </g>

  <!-- CARD 5: Aviary Humidity -->
  <g transform="translate(585, 335)">
    <rect width="270" height="180" rx="12" fill="#1E293B" stroke="#334155" />
    <circle cx="230" cy="35" r="5" fill="#8B5CF6" />
    <text x="25" y="35" class="card-title">Aviary Humidity</text>
    <text x="25" y="70" class="card-data" fill="#8B5CF6">68% Rel. Humidity</text>
    <text x="25" y="90" class="card-status">Ventilation systems operational</text>
    <!-- Humidity progress bar -->
    <rect x="25" y="130" width="220" height="12" rx="6" fill="#1E293B" stroke="#334155"/>
    <rect x="25" y="130" width="150" height="12" rx="6" fill="#8B5CF6"/>
  </g>

  <!-- CARD 6: Wildlife Camera Traps -->
  <g transform="translate(880, 335)">
    <rect width="270" height="180" rx="12" fill="#1E293B" stroke="#334155" />
    <circle cx="230" cy="35" r="5" fill="#EF4444" />
    <text x="25" y="35" class="card-title">Wildlife Camera Traps</text>
    <text x="25" y="70" class="card-data" fill="#EF4444">4 Active Feeds</text>
    <text x="25" y="90" class="card-status">Last trigger: 2 mins ago (Panthera)</text>
    <!-- Bounding box graphic -->
    <rect x="65" y="115" width="140" height="50" rx="4" fill="none" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="3,3"/>
    <text x="75" y="130" font-family="Inter" font-size="10px" fill="#EF4444" font-weight="700">DETECTING FAUNA...</text>
  </g>

  <!-- CARD 7: Climate Index Telemetry -->
  <g transform="translate(290, 540)">
    <rect width="415" height="230" rx="12" fill="#1E293B" stroke="#334155" />
    <circle cx="375" cy="35" r="5" fill="#10B981" />
    <text x="25" y="35" class="card-title">Carbon Offset Telemetry</text>
    <text x="25" y="70" class="card-data" fill="#10B981">-4.2 Tons CO2 / Month</text>
    <text x="25" y="90" class="card-status">Tree density index and carbon sink tracking</text>
    <!-- Large area line chart representing carbon levels -->
    <path d="M25 210 L100 170 L175 185 L250 150 L325 130 L390 110" stroke="#10B981" stroke-width="3" fill="none"/>
    <path d="M25 210 L100 170 L175 185 L250 150 L325 130 L390 110 V210 H25 Z" fill="#10B981" opacity="0.1"/>
  </g>

  <!-- CARD 8: Bee Hive Telemetry -->
  <g transform="translate(735, 540)">
    <rect width="415" height="230" rx="12" fill="#1E293B" stroke="#334155" />
    <circle cx="375" cy="35" r="5" fill="#F59E0B" />
    <text x="25" y="35" class="card-title">Bee Hive Analytics</text>
    <text x="25" y="70" class="card-data" fill="#F59E0B">Activity: Highly Active</text>
    <text x="25" y="90" class="card-status">Pollinator count &amp; swarming activity diagnostics</text>
    <!-- Honeycomb hexagonal graphic representation -->
    <path d="M50 150 L70 140 L90 150 L90 170 L70 180 L50 170 Z M90 150 L110 140 L130 150 L130 170 L110 180 L90 170 Z M70 180 L90 170 L110 180 L110 200 L90 210 L70 200 Z" fill="none" stroke="#F59E0B" stroke-width="1.5" opacity="0.7"/>
  </g>
</svg>